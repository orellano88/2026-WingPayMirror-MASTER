name: Android PayMirror Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Proyecto
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Construir con Gradle Oficial
      uses: gradle/gradle-build-action@v3
      with:
        arguments: assembleRelease --stacktrace

    - name: Firmar APK (Anti-PlayProtect Protocol)
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Entregar APK a la Tierra (JARVIS Protocol)
      uses: actions/upload-artifact@v4
      with:
        name: WingPay_Enterprise_v65.5_STARK
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
