name: Build WingPay APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          # Si usas el keystore local, asegúrate de que esté en el repo o usa Base64
          # Por ahora usaremos el keystore que ya está en la carpeta raíz del repo
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYALIAS_PASSWORD: ${{ secrets.KEYALIAS_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WingPay-Enterprise-v65-STARK
          path: app/build/outputs/apk/release/*.apk
